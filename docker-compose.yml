services:
  pai:
    # 直接拉取 GHCR 预构建镜像（由 .github/workflows/docker-publish.yml 自动构建）
    # 如需本地构建，注释 image 行、取消注释 build 行
    image: ghcr.io/mxlitey/pai-docker:latest
    # build: .
    container_name: pai
    restart: unless-stopped
    ports:
      - "8788:8788"
    volumes:
      - pai-data:/app/data
    environment:
      # 可选：自定义服务监听端口（容器内）
      PORT: "8788"
      # 时区（默认 Asia/Shanghai，可改为其他时区如 America/Los_Angeles）
      TZ: "Asia/Shanghai"

volumes:
  pai-data:
