name: Build and Push Docker Image to GHCR (Tag)

# 触发条件：
# - 打 v* 开头的 tag（如 v1.2.3）：构建并推送，打语义化版本标签 + latest
# 注意：tag 推送不应用 paths-ignore（GitHub Actions 限制：paths 过滤会使 tag 事件失效），
#       故拆为独立 workflow 文件以同时满足「scripts/ 改动不触发分支构建」与「tag 推送仍触发构建」。
on:
  push:
    tags: ['v*']

# GHCR 推送需要 packages: write 权限；拉取代码需要 contents: read
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 生成镜像标签与 labels，规则：
      # - type=semver(>pattern={{version}})  完整版本号（如 1.2.3）
      # - type=semver(>pattern={{major}}.{{minor}})  主次版本（如 1.2）
      # - type=semver(>pattern={{major}})  主版本（如 1）
      # - type=sha,format=short            短 commit sha（如 c2689ee）
      # - type=raw,value=latest            tag 触发时打 latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest

      - name: Set up QEMU（多架构支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送：多架构 linux/amd64 + linux/arm64，便于 ARM 服务器 / Apple Silicon 直接拉取
      # cache-to/cache-from 使用 GHCR 缓存加速后续构建
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
